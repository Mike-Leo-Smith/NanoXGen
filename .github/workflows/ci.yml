name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build zlib1g-dev
          cmake --version
          ninja --version

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Test
        run: ctest --preset release

      - name: Verify installed CMake package
        run: |
          cmake --install build/release --prefix build/install
          cmake -S tests/cmake-consumer -B build/consumer -G Ninja \
            -DCMAKE_PREFIX_PATH="$PWD/build/install"
          cmake --build build/consumer
          ./build/consumer/nanoxgen_consumer
